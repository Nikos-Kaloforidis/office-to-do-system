name: Office ToDo CI Workflow

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: CI Pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Lint code
        run: uv run ruff check --fix

      - name: Start db
        env:
          DATABASE_URL: postgresql://admin:admin@localhost:5432/officeToDo
        run: |
          docker compose -f docker-compose.yaml up -d db test_db
          until docker compose  exec db pg_isready -U admin -d officeToDo; do
            echo "Waiting for DB to be ready..."
            sleep 5
          done

      - name: Run tests
        run: uv run pytest
