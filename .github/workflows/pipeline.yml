name: Office ToDo CI Workflow

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: CI Pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Lint code
        run: uv run ruff check --fix

      - name: Start db
        run: |
          docker compose up -d
          until docker compose  exec test_db pg_isready -U admin -d officeToDo_test; do
            echo "Waiting for DB to be ready..."
            sleep 2
          done

      - name: Run tests
        run: |
          export DATABASE_URL="postgresql://admin:admin@localhost:5433/officeToDo_test"
          export TEST_DATABASE_URL="postgresql://admin:admin@localhost:5433/officeToDo_test"
          export PYTHONPATH=.
          export SECRET_KEY='ac5dc59bd6ae58c9040134eefaba995e9ed625a5530658c487609b31fd6d41c0'

          uv run pytest
